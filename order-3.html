<body>

  <div id="formWrap">
    <p class="alert"><strong>Зверніть увагу</strong> - 3 ароматизатори це ваш 3 унікальний код на розіграш авто</p>


<hr>

<p class="section-title">Інформація про вас</p>

<div class="field">
  <label>Ім'я *</label>
  <input type="text" id="fname" />
</div>

<div class="field">
  <label>Прізвище</label>
  <input type="text" id="flastname" />
</div>

<div class="field">
  <label>Ел. адреса *</label>
  <input type="email" id="femail" />
</div>

<div class="field">
  <label>Вкажіть адресу доставки, та ваш контактний номер телефону *</label>
  <textarea id="fdelivery"></textarea>
</div>

<button class="btn-send" onclick="sendForm()">Надіслати</button>
<a href="https://ibanoplata.com/iban-qr/42fc90942f6541d88d3ccaa0b8fc32ab" class="btn-pay">О П Л А Т И Т И</a>


  </div>

  <div class="success" id="successScreen">
    <h2>✅ Дані надіслано!</h2>
    <p>Ваші дані отримано.<br>Тепер перейдіть до оплати.</p>
    <a href="https://ibanoplata.com/iban-qr/42fc90942f6541d88d3ccaa0b8fc32ab" class="btn-pay" style="width:70%;display:block;margin:0 auto">О П Л А Т И Т И</a>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function sendForm() {
      const name = document.getElementById('fname').value.trim();
      const lastname = document.getElementById('flastname').value.trim();
      const email = document.getElementById('femail').value.trim();
      const delivery = document.getElementById('fdelivery').value.trim();

      if (!name) { showToast("Введіть ім'я"); return; }
      if (!email || !email.includes('@')) { showToast('Введіть правильний email'); return; }
      if (!delivery) { showToast('Вкажіть адресу та телефон'); return; }

      const fd = new FormData();
      fd.append('_subject', 'Нове замовлення — 3 ароматизатори BMW M760Li');
      fd.append("Im'ya", name + ' ' + lastname);
      fd.append('Email', email);
      fd.append('Dostavka', delivery);
      fd.append('Paket', '3 aromatyzatory — 267 UAH');
      fd.append('_captcha', 'false');
      fd.append('_template', 'table');

      try {
        await fetch('https://formsubmit.co/Nedilskystudio@gmail.com', {
          method: 'POST',
          body: fd
        });
      } catch(e) {}

      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('successScreen').classList.add('show');
    }
  </script>
