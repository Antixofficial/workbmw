<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата успішна — Акція BMW M760Li</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .emoji { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
    .subtitle { color: #888; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .order-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
    }
    .order-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .order-number { font-size: 2rem; font-weight: 800; color: #e07b39; }
    .order-name { font-size: 15px; color: #ccc; margin-top: 8px; }
    .screenshot { font-size: 13px; color: #666; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b35, #e07b39);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>Оплата успішна!</h1>
    <p class="subtitle">Дякуємо за замовлення! Ваш унікальний номер замовлення збережено.</p>

    <div class="order-box">
      <div class="order-label">Ваш номер замовлення</div>
      <div class="order-number" id="orderNumber">—</div>
      <div class="order-name" id="orderName"></div>
    </div>

    <p class="screenshot">📸 Зробіть скріншот і збережіть свій номер!</p>

    <a href="/" class="btn">🏠 Повернутись на сайт</a>
  </div>

  <script>
    const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzCNnm04vPd3zY30bbAt2kqtHWJAiUH94nAolctktDZKGoL2C4CnQXqhNhzDWSrh3io/exec';
    const STORAGE_KEY = 'bmwPromoV2';

    function generateNumber() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let result = 'A-';
      for (let i = 0; i < 5; i++) result += chars[Math.floor(Math.random() * chars.length)];
      return result;
    }

    function maskPhone(phone) {
      if (!phone || phone.length < 6) return phone;
      return phone.slice(0, 6) + '*** ** ' + phone.slice(-2);
    }

    function fmtDate() {
      const d = new Date();
      return d.toISOString().slice(0, 16).replace('T', ' ');
    }

    async function sendToSheets(participant) {
      try {
        await fetch(SHEETS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action:    'add',
            number:    participant.number,
            name:      participant.name,
            phone:     participant.phone,
            email:     participant.email,
            city:      participant.city,
            warehouse: participant.warehouse,
            tickets:   participant.tickets,
            amount:    participant.amount,
            createdAt: participant.createdAt,
          }),
        });
      } catch(e) {
        console.log('Sheets error:', e);
      }
    }

    const raw = localStorage.getItem('pendingOrder');
    if (raw) {
      const p = JSON.parse(raw);
      const number = generateNumber();

      document.getElementById('orderNumber').textContent = number;
      document.getElementById('orderName').textContent = p.name || '';

      const participant = {
        number,
        orderId:   p.orderId,
        name:      p.name,
        phone:     maskPhone(p.phone || ''),
        email:     p.email,
        city:      p.city || '—',
        warehouse: p.warehouse || '—',
        tickets:   p.tickets,
        amount:    p.amount,
        createdAt: fmtDate(),
      };

      // Зберігаємо в localStorage
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      saved.unshift(participant);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      localStorage.removeItem('pendingOrder');

      // ✅ Відправляємо в Google Sheets
      sendToSheets(participant);
    }
  </script>
</body>
</html>
