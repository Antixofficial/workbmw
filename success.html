  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата успішна — Акція BMW M760Li</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .emoji { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
    .subtitle { color: #888; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .order-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
    }
    .order-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .order-number { font-size: 2rem; font-weight: 800; color: #e07b39; }
    .order-name { font-size: 15px; color: #ccc; margin-top: 8px; }
    .screenshot { font-size: 13px; color: #666; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b35, #e07b39);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      width: 100%;
    }
  </style>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>Оплата успішна!</h1>
    <p class="subtitle">Дякуємо за замовлення! Ваш унікальний номер замовлення збережено.</p>

    <div class="order-box">
      <div class="order-label">Ваш номер замовлення</div>
      <div class="order-number" id="orderNumber">—</div>
      <div class="order-name" id="orderName"></div>
    </div>

    <p class="screenshot">📸 Зробіть скріншот і збережіть свій номер!</p>

    <a href="/" class="btn">🏠 Повернутись на сайт</a>
  </div>

  <script>
    const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxdmOUrNrtiv_oQXceUE-1KwAjOQ-F2sJAWN0kpRPbYcobQ8pDGHtpXO0gdziPUY-O7/exec';
    const STORAGE_KEY = 'bmwPromoV2';

    function generateNumber() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let result = 'A-';
      for (let i = 0; i < 5; i++) result += chars[Math.floor(Math.random() * chars.length)];
      return result;
    }

    function maskPhone(phone) {
      if (!phone || phone.length < 6) return phone;
      return phone.slice(0, 6) + '*** ** ' + phone.slice(-2);
    }

    async function sendToSheets(participant, retries = 3) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          await fetch(SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action:    'add',
              number:    participant.number,
              name:      participant.name,
              phone:     participant.phone,
              email:     participant.email,
              city:      participant.city,
              warehouse: participant.warehouse,
              tickets:   participant.tickets,
              amount:    participant.amount,
              createdAt: participant.createdAt,
              orderId:   participant.orderId,
            }),
          });
          console.log('✅ Sheets OK:', participant.number);
          return;
        } catch(e) {
          console.log('❌ Sheets error attempt', attempt, e);
          if (attempt < retries) await new Promise(r => setTimeout(r, 1500 * attempt));
        }
      }
    }

    function getPendingData() {
      // 1. Спочатку пробуємо з URL параметра ?d=
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const d = urlParams.get('d');
        if (d) {
          const decoded = decodeURIComponent(escape(atob(d)));
          const parsed = JSON.parse(decoded);
          if (parsed && parsed.name) {
            console.log('📦 Дані з URL параметра');
            return parsed;
          }
        }
      } catch(e) { console.log('URL param parse error:', e); }

      // 2. Резервний — localStorage
      try {
        const raw = localStorage.getItem('pendingOrder') || localStorage.getItem('pendingOrderBackup');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.name) {
            console.log('📦 Дані з localStorage');
            return parsed;
          }
        }
      } catch(e) { console.log('localStorage parse error:', e); }

      // 3. Резервний — encoded localStorage
      try {
        const enc = localStorage.getItem('pendingOrderEncoded');
        if (enc) {
          const decoded = decodeURIComponent(escape(atob(enc)));
          const parsed = JSON.parse(decoded);
          if (parsed && parsed.name) {
            console.log('📦 Дані з encoded localStorage');
            return parsed;
          }
        }
      } catch(e) { console.log('encoded parse error:', e); }

      return null;
    }

    // Запускаємо
    const p = getPendingData();
    if (p) {
      const tickets = Number(p.tickets) || 1;
      const now = new Date();
      const kyiv = new Date(now.getTime() + 3 * 60 * 60 * 1000);
      const pad = n => String(n).padStart(2, '0');
      const createdAt = kyiv.getUTCFullYear() + '-' + pad(kyiv.getUTCMonth()+1) + '-' + pad(kyiv.getUTCDate()) + ' ' + pad(kyiv.getUTCHours()) + ':' + pad(kyiv.getUTCMinutes());

      const numbers = [];
      for (let i = 0; i < tickets; i++) numbers.push(generateNumber());

      const label = document.querySelector('.order-label');
      if (label) label.textContent = tickets > 1 ? 'Ваші ' + tickets + ' номери замовлення' : 'Ваш номер замовлення';

      document.getElementById('orderNumber').innerHTML = numbers.map(n =>
        '<div style="color:#e07b39;font-weight:900;font-size:1.8rem;margin:6px 0">' + n + '</div>'
      ).join('');
      document.getElementById('orderName').textContent = p.name || '';

      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      numbers.forEach((number, i) => {
        const participantSite = {
          number,
          orderId:   (p.orderId || '') + (tickets > 1 ? '-' + (i+1) : ''),
          name:      p.name,
          phone:     maskPhone(p.phone || ''),
          email:     p.email,
          city:      p.city || '—',
          warehouse: p.warehouse || '—',
          tickets:   1,
          amount:    (Number(p.amount) / tickets).toFixed(2),
          createdAt,
        };
        saved.unshift(participantSite);
        sendToSheets({ ...participantSite, phone: p.phone || '' });
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      localStorage.removeItem('pendingOrder');
      localStorage.removeItem('pendingOrderBackup');
      localStorage.removeItem('pendingOrderEncoded');
    } else {
      console.log('⚠️ pendingOrder не знайдено — можливо сторінка відкрита напряму');
    }
  </script>
</body>
</html>
