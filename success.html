  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 48px 32px; max-width: 480px; width: 100%; text-align: center; }

    .order-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>Оплата успішна!</h1>
    <p class="subtitle">Дякуємо за замовлення! Збережіть свої номери для участі в акції.</p>
    <div class="order-box">
      <div class="order-label" id="orderLabel">Ваш номер замовлення</div>
      <div id="orderNumber"><span class="loading">Завантаження...</span></div>
      <div class="order-name" id="orderName"></div>
    </div>
    <p class="screenshot">📸 Зробіть скріншот і збережіть свої номери!</p>
    <a href="/" class="btn">🏠 Повернутись на сайт</a>
    <p class="support">Проблеми з номером? <a href="https://t.me/aikovyc_h" target="_blank">@aikovyc_h</a></p>
  </div>

  <script>
    const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxdmOUrNrtiv_oQXceUE-1KwAjOQ-F2sJAWN0kpRPbYcobQ8pDGHtpXO0gdziPUY-O7/exec';
    const STORAGE_KEY = 'bmwPromoV2';

    function generateNumber() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let r = 'A-';
      for (let i = 0; i < 5; i++) r += chars[Math.floor(Math.random() * chars.length)];
      return r;
    }

    function maskPhone(p) {
      if (!p || p.length < 6) return p;
      return p.slice(0, 6) + '*** ** ' + p.slice(-2);
    }

    function kyivTime() {
      const k = new Date(Date.now() + 3 * 60 * 60 * 1000);
      const pad = n => String(n).padStart(2, '0');
      return k.getUTCFullYear()+'-'+pad(k.getUTCMonth()+1)+'-'+pad(k.getUTCDate())+' '+pad(k.getUTCHours())+':'+pad(k.getUTCMinutes());
    }

    async function sendBatchToSheets(rows) {
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          await fetch(SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'addBatch', rows }),
          });
          console.log('✅ Batch OK:', rows.length, 'номерів');
          return;
        } catch(e) {
          console.log('❌ Attempt', attempt, e);
          if (attempt < 3) await new Promise(r => setTimeout(r, 2000 * attempt));
        }
      }
    }

    function getFromStorage() {
      try { const p = JSON.parse(localStorage.getItem('pendingOrder') || localStorage.getItem('pendingOrderBackup') || 'null'); if (p?.name) return p; } catch(e) {}
      try { const p = JSON.parse(decodeURIComponent(escape(atob(localStorage.getItem('pendingOrderEncoded')||'')))); if (p?.name) return p; } catch(e) {}
      return null;
    }

    async function getFromSheets() {
      try {
        const res = await fetch(SHEETS_URL + '?action=getPending&t=' + Date.now());
        const data = await res.json();
        if (data?.pending?.name) return data.pending;
      } catch(e) {}
      return null;
    }

    function showNumbers(p) {
      const tickets = Math.max(1, Number(p.tickets) || 1);
      const createdAt = kyivTime();
      const numbers = Array.from({ length: tickets }, () => generateNumber());

      document.getElementById('orderLabel').textContent =
        tickets > 1 ? 'Ваші ' + tickets + ' номери для участі' : 'Ваш номер для участі';

      document.getElementById('orderNumber').innerHTML = numbers.map(n =>
        '<div style="color:#e07b39;font-weight:900;font-size:1.8rem;margin:8px 0;letter-spacing:.05em">' + n + '</div>'
      ).join('');
      document.getElementById('orderName').textContent = p.name || '';

      // Зберігаємо в localStorage
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        numbers.forEach((number, i) => saved.unshift({
          number,
          orderId:   (p.orderId||'') + (tickets > 1 ? '-'+(i+1) : ''),
          name: p.name, phone: maskPhone(p.phone||''), email: p.email||'',
          city: p.city||'—', warehouse: p.warehouse||'—',
          tickets: 1, amount: (Number(p.amount)/tickets).toFixed(2), createdAt,
        }));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        localStorage.removeItem('pendingOrder');
        localStorage.removeItem('pendingOrderBackup');
        localStorage.removeItem('pendingOrderEncoded');
      } catch(e) {}

      // Один batch запит для всіх номерів
      const rows = numbers.map((number, i) => ({
        number, name: p.name, phone: p.phone||'', email: p.email||'',
        city: p.city||'—', warehouse: p.warehouse||'—',
        tickets: 1, amount: (Number(p.amount)/tickets).toFixed(2),
        createdAt, orderId: (p.orderId||'') + (tickets > 1 ? '-'+(i+1) : ''),
      }));
      sendBatchToSheets(rows);
    }

    async function init() {
      const fromStorage = getFromStorage();
      if (fromStorage) { console.log('📦 localStorage'); showNumbers(fromStorage); return; }

      console.log('📡 Sheets pending...');
      const fromSheets = await getFromSheets();
      if (fromSheets) { console.log('📦 Sheets'); showNumbers(fromSheets); return; }

      document.getElementById('orderNumber').innerHTML =
        '<div style="color:#888;font-size:13px">Не вдалось завантажити.<br>Напишіть: <a href="https://t.me/aikovyc_h" style="color:#e07b39">@aikovyc_h</a></div>';
    }

    init();
  </script>
