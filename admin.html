<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — AI Agency BMW Giveaway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .admin-login__box { background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.3); border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; }
    .admin-login__box h1 { font-size: 2rem; margin-bottom: 8px; }
    .admin-login__box p { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
    .admin-panel { min-height: 100vh; padding: calc(var(--header-h) + 40px) 0 60px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
    .admin-header h1 { font-size: 2rem; }
    .admin-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .btn-success { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: .25s; font-family: 'Manrope', sans-serif; }
    .btn-success:hover { background: rgba(34,197,94,0.2); }
    .btn-danger { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: .25s; font-family: 'Manrope', sans-serif; }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .winner-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.4); border-radius: 20px; padding: 32px; text-align: center; margin-bottom: 40px; }
    .winner-box h2 { font-size: 1.5rem; margin-bottom: 12px; }
    .winner-result { font-size: 3rem; font-weight: 800; color: #ffb067; margin: 20px 0 8px; }
    .winner-sub { color: var(--muted); font-size: 14px; }
    .admin-search-wrap { margin-bottom: 16px; }
    .admin-search-wrap input { max-width: 400px; border-radius: 999px; padding: 0 20px; }
    td button { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Manrope', sans-serif; border: 1px solid rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); color: #ef4444; transition: .2s; }
    td button:hover { background: rgba(239,68,68,0.2); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginPage" class="admin-login">
    <div class="admin-login__box">
      <div style="font-size:3rem;margin-bottom:16px;">🔐</div>
      <h1>Адмін панель</h1>
      <p>Доступ тільки для власників проекту</p>
      <div style="text-align:left">
        <label>
          <span style="display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px;">Пароль</span>
          <input type="password" id="pwInput" placeholder="••••••••" style="margin-bottom:16px" />
        </label>
      </div>
      <button class="btn btn--primary" style="width:100%;justify-content:center" id="loginBtn">Увійти →</button>
      <a href="index.html" style="display:block;margin-top:20px;font-size:13px;color:var(--muted)">← На сайт</a>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPage" class="hidden">
    <header class="site-header scrolled" style="position:fixed">
      <div class="nav container">
        <span class="brand"><strong>AI Agency</strong><span>Admin Panel</span></span>
        <div style="margin-left:auto;display:flex;gap:12px;align-items:center">
          <a href="index.html" style="color:var(--muted);font-size:13px;">← На сайт</a>
          <button class="btn-danger" id="logoutBtn">Вийти</button>
        </div>
      </div>
    </header>

    <div class="admin-panel container">
      <div class="admin-header">
        <h1>Панель керування <span style="color:#ffb067">розіграшем</span></h1>
      </div>

      <!-- Stats -->
      <div class="stats-row" style="margin-bottom:40px">
        <div class="stat-card"><span class="stat-num" id="aTotal">0</span><span class="stat-lbl">Учасників</span></div>
        <div class="stat-card"><span class="stat-num" id="aTickets">0</span><span class="stat-lbl">Квитків</span></div>
        <div class="stat-card"><span class="stat-num" id="aRevenue" style="color:#22c55e">$0</span><span class="stat-lbl">Зібрано</span></div>
        <div class="stat-card"><span class="stat-num" id="aToday">0</span><span class="stat-lbl">Сьогодні</span></div>
      </div>

      <!-- Winner picker -->
      <div class="winner-box">
        <h2>🎲 Вибрати переможця</h2>
        <p style="color:var(--muted);font-size:14px;margin-bottom:20px">Натисни для рандомного вибору з усіх учасників</p>
        <button class="btn btn--primary" id="pickWinnerBtn">🏆 Вибрати переможця рандомно</button>
        <div id="winnerResult" class="hidden">
          <div class="winner-result" id="winnerNum">—</div>
          <div class="winner-sub" id="winnerInfo">—</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="admin-actions">
        <button class="btn-success" id="exportCsvBtn">📥 Експорт CSV</button>
        <button class="btn-success" id="addDemoBtn">➕ Тестовий учасник</button>
        <button class="btn-danger" id="clearAllBtn">🗑 Очистити всіх</button>
      </div>

      <!-- Search -->
      <div class="admin-search-wrap">
        <input type="text" id="adminSearch" placeholder="🔍 Пошук за ім'ям, email або номером..." />
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Номер</th>
              <th>Ім'я</th>
              <th>Email</th>
              <th>Телефон</th>
              <th>Місто</th>
              <th>Квитків</th>
              <th>Сума</th>
              <th>Дата</th>
              <th>Дія</th>
            </tr>
          </thead>
          <tbody id="adminTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    // =====================================================
    // 🔐 ПАРОЛЬ АДМІН-ПАНЕЛІ — змінити тут!
    // Не залежить від script.js CONFIG
    // =====================================================
    const ADMIN_PASSWORD_LOCAL = 'admin12345';
  const ADMIN_KEY = 'bmw_admin_auth';


  function checkAuth() {
    return sessionStorage.getItem(ADMIN_KEY) === '1';
  }

  function showAdmin() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('adminPage').classList.remove('hidden');
    loadData();
  }

  function showLogin() {
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('adminPage').classList.add('hidden');
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (checkAuth()) {
      showAdmin();
    } else {
      showLogin();
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      const pw = document.getElementById('pwInput').value;

      if (pw === ADMIN_PASSWORD_LOCAL) {
        sessionStorage.setItem(ADMIN_KEY, '1');
        showAdmin();
      } else {
        showToast('❌ Невірний пароль!');
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    });

    document.getElementById('pwInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem(ADMIN_KEY);
      showLogin();
    });
  });

  const STORAGE_KEY_LOCAL = 'bmwGiveawayV2';

  function getRealParticipants() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY_LOCAL) || '[]');
    } catch {
      return [];
    }
  }

  function loadData(filter = '') {
    const all = getRealParticipants();
    const today = new Date().toDateString();
    const totalTickets = all.reduce((s, p) => s + (Number(p.tickets) || 1), 0);
    const revenue = all.reduce((s, p) => s + (Number(p.amount) || 0), 0);
    const todayCount = all.filter(p => new Date(p.createdAt).toDateString() === today).length;

    document.getElementById('aTotal').textContent = all.length;
    document.getElementById('aTickets').textContent = totalTickets;
    document.getElementById('aRevenue').textContent = `$${revenue}`;
    document.getElementById('aToday').textContent = todayCount;

    const filtered = filter
      ? all.filter(p =>
          p.name?.toLowerCase().includes(filter.toLowerCase()) ||
          p.email?.toLowerCase().includes(filter.toLowerCase()) ||
          String(p.number).includes(filter)
        )
      : all;

    const tbody = document.getElementById('adminTbody');

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Немає учасників</td></tr>`;
      return;
    }

    tbody.innerHTML = [...filtered].reverse().map(p => `
      <tr>
        <td>${esc(p.number)}</td>
        <td>${esc(p.name)}</td>
        <td style="color:var(--muted)">${esc(p.email || '—')}</td>
        <td style="color:var(--muted)">${esc(p.phone || '—')}</td>
        <td style="color:var(--muted)">${esc(p.city || '—')}</td>
        <td style="text-align:center">${p.tickets || 1}</td>
        <td style="color:#22c55e">$${p.amount || 0}</td>
        <td style="color:var(--muted)">${esc(p.createdAt || '')}</td>
        <td><button onclick="deletePart('${esc(p.number)}')">Видалити</button></td>
      </tr>
    `).join('');
  }

  document.getElementById('adminSearch').addEventListener('input', e => loadData(e.target.value));

  function deletePart(num) {
    if (!confirm(`Видалити учасника ${num}?`)) return;
    const all = getRealParticipants().filter(p => p.number !== num);
    localStorage.setItem(STORAGE_KEY_LOCAL, JSON.stringify(all));
    loadData();
    showToast('✅ Видалено');
  }

  window.deletePart = deletePart;

    // Pick winner
    document.getElementById('pickWinnerBtn').addEventListener('click', () => {
      const all = getRealParticipants();
      if (!all.length) { showToast('❌ Немає учасників!'); return; }
      const btn = document.getElementById('pickWinnerBtn');
      btn.disabled = true;
      document.getElementById('winnerResult').classList.remove('hidden');
      let count = 0;
      const interval = setInterval(() => {
        const r = all[Math.floor(Math.random() * all.length)];
        document.getElementById('winnerNum').textContent = r.number;
        document.getElementById('winnerInfo').textContent = r.name;
        if (++count >= 25) {
          clearInterval(interval);
          const winner = all[Math.floor(Math.random() * all.length)];
          document.getElementById('winnerNum').textContent = winner.number;
          document.getElementById('winnerInfo').textContent = `🎉 ${winner.name} — ${winner.email||winner.phone||''}`;
          btn.disabled = false;
        }
      }, 80);
    });

    // Export CSV
    document.getElementById('exportCsvBtn').addEventListener('click', () => {
      const all = getRealParticipants();
      if (!all.length) { showToast('Немає даних для експорту'); return; }
      const header = 'Номер,Ім\'я,Email,Телефон,Місто,Квитків,Сума,Дата';
      const rows = all.map(p =>
        `"${p.number}","${p.name}","${p.email||''}","${p.phone||''}","${p.city||''}",${p.tickets||1},${p.amount||0},"${p.createdAt||''}"`
      );
      const csv = '\uFEFF' + [header, ...rows].join('\n');
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' })),
        download: `BMW_Giveaway_${new Date().toISOString().slice(0,10)}.csv`,
      });
      a.click();
    });

    // Add demo
    document.getElementById('addDemoBtn').addEventListener('click', () => {
      const name = DEMO_NAMES[Math.floor(Math.random() * DEMO_NAMES.length)];
      const all = getRealParticipants();
      const p = {
        number: `A-${Math.floor(10000 + Math.random() * 90000)}`,
        orderId: `ORD-DEMO-${Date.now()}`,
        name,
        email: `demo${Date.now()}@example.com`,
        phone: `+380 67 *** ** ${String(Math.floor(Math.random()*99)).padStart(2,'0')}`,
        city: ['Київ','Львів','Одеса','Харків'][Math.floor(Math.random()*4)],
        tickets: Math.ceil(Math.random() * 3),
        amount: Math.ceil(Math.random() * 3) * 2,
        createdAt: new Date().toISOString().slice(0,16).replace('T',' '),
      };
      all.unshift(p);
      localStorage.setItem(STORAGE_KEY_LOCAL, JSON.stringify(all));
      loadData();
      showToast(`✅ Додано: ${name}`);
    });

    // Clear all
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (!confirm('Видалити ВСІХ учасників? Це незворотньо!')) return;
      if (!confirm('Ви впевнені? Останній шанс!')) return;
      localStorage.removeItem(STORAGE_KEY_LOCAL);
      loadData();
      showToast('🗑 Базу очищено');
    });
  </script>
</body>
</html>
